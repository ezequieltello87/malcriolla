<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERÍA | MALCRIOLLA</title>
    <!-- Luminous CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luminous-lightbox@2.3.2/dist/luminous-basic.min.css">
    <style>
        @font-face {
            font-family: 'Metrim';
            src: url('fonts/MetrimLetter-Regular.ttf') format('truetype');
        }

        body { margin: 0; padding: 0; background: #ffffff; font-family: 'Helvetica Neue', sans-serif; color: #000; }

        /* Header Replicado */
        header { padding: 25px 0; background: #fff; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Metrim', sans-serif; font-size: 32px; text-transform: uppercase; letter-spacing: 4px; margin: 20px 0; }
        
        .nav-galeria { padding: 20px 40px; }
        .btn-volver { text-decoration: none; color: #000; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* Galería mejorada */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .luminous-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }
        .luminous-item img:hover { transform: scale(1.02); }

        /* Footer Replicado */
        .footer { background: #ffffff; padding: 60px 20px; text-align: center; border-top: 1px solid #eeeeee; margin-top: 40px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer-links a { font-size: 11px; color: #000; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="nav-galeria">
        <a href="index.html" class="btn-volver">&#8592; VOLVER AL INICIO</a>
    </nav>

    <header>
        <h1>Colección Completa</h1>
    </header>

    <div class="galeria-grid" id="galeria">
        <a href="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=1200" class="luminous-item"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800" alt="Foto 1"></a>
        <a href="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1200" class="luminous-item"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800" alt="Foto 2"></a>
        <a href="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=1200" class="luminous-item"><img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=800" alt="Foto 3"></a>
        <a href="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=1200" class="luminous-item"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=800" alt="Foto 4"></a>
    </div>

    <footer class="footer">
        <div class="footer-contenido">
            <p style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #999;">&copy; 2026 MALCRIOLLA. TODOS LOS DERECHOS RESERVADOS.</p>
            <div class="footer-links">
                <a href="#">INSTAGRAM</a>
                <a href="#">WHATSAPP</a>
                <a href="#">TÉRMINOS</a>
            </div>
        </div>
    </footer>

    <!-- Luminous JS -->
    <script src="https://cdn.jsdelivr.net/npm/luminous-lightbox@2.3.2/dist/Luminous.min.js"></script>
    <script>
        new LuminousGallery(document.querySelectorAll(".luminous-item"));
    </script>
</body>
</html>
