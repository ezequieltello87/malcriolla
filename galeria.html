    <style>
        @font-face {
            font-family: 'Metrim';
            src: url('fonts/MetrimLetter-Regular.ttf') format('truetype');
        }

        body { margin: 0; padding: 0; background: #ffffff; font-family: 'Helvetica Neue', sans-serif; color: #000; }

        /* Header Base (transparente, estado inicial) */
        header { 
            background: transparent; 
            padding: 25px 0; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 9999; 
            transition: all 0.4s ease; 
        }

        .header-estructura { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }


        /* Elementos del Header */
        .menu-btn { background: transparent; border: none; color: #ffffff; cursor: pointer; text-transform: uppercase; justify-self: start; }
        .logo-bloque { display: flex; flex-direction: column; align-items: center; justify-self: center; }
        .logo-dinamico { height: 40px; width: auto; content: url("img/LOGO BLANCO.png"); transition: all 0.4s ease; }
        .ig-link { color: #ffffff; justify-self: end; text-decoration: none; }

        /* Header Shrink (el que usas para colecciones) */
        header.shrink { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 0; 
            border-bottom: 1px solid #eee; 
        }

        header.shrink .menu-btn, 
        header.shrink .ig-link { 
            color: #000000; 
        }

        header.shrink .logo-dinamico { 
            height: 25px; 
            content: url("img/LOGO NEGRO.png"); 
        }
        
        .nav-galeria { padding: 20px 40px; }
        .btn-volver { align-self: flex-start; /* Botón alineado con el texto */
            padding: 10px 25px;
            border: 1px solid #fff;
            color: #fff;
            background: #000;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase; }

        .btn-volver:hover {
            background: #fff;
            color: #000;
        }
        /* Galería mejorada */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .luminous-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }
        .luminous-item img:hover { transform: scale(1.02); }


        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            z-index: 9999;
            transition: transform 0.3s ease;
        }

        .whatsapp-float img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .whatsapp-float:hover {
            transform: scale(1.1); /* Efecto al pasar el mouse */
        }

        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .whatsapp-float {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
        }

        /* Footer Replicado */
        .footer { background: #ffffff; padding: 60px 20px; text-align: center; border-top: 1px solid #eeeeee; margin-top: 40px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer-links a { font-size: 11px; color: #000; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
