    <style>
        /* Header Base (transparente, estado inicial) */
        header { 
            background: transparent; 
            padding: 25px 0; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 9999; 
            transition: all 0.4s ease; 
        }

        .header-estructura { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }

        /* Elementos del Header */
        .menu-btn { background: transparent; border: none; color: #ffffff; cursor: pointer; text-transform: uppercase; justify-self: start; }
        .logo-bloque { display: flex; flex-direction: column; align-items: center; justify-self: center; }
        .logo-dinamico { height: 40px; width: auto; content: url("img/LOGO BLANCO.png"); transition: all 0.4s ease; }
        .ig-link { color: #ffffff; justify-self: end; text-decoration: none; }

        /* Header Shrink (el que usas para colecciones) */
        header.shrink { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px 0; 
            border-bottom: 1px solid #eee; 
        }

        header.shrink .menu-btn, 
        header.shrink .ig-link { 
            color: #000000; 
        }

        header.shrink .logo-dinamico { 
            height: 25px; 
            content: url("img/LOGO NEGRO.png"); 
        }


        .colecciones-grid {
            display: grid;
            /* Esto crea columnas que se ajustan solas; minmax(300px, 1fr) permite que se vean dos por fila en desktop */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 150px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .coleccion-card {
            text-align: left; /* Alineado a la izquierda para estilo más editorial */
            display: flex;
            flex-direction: column;
        }

        .coleccion-card img {
            width: 100%;
            /* Aspect ratio 4/5 le da un aire de "retrato" alto y elegante */
            aspect-ratio: 4 / 5;
            object-fit: cover;
            margin-bottom: 20px;
            transition: filter 0.5s ease;
        }



        .coleccion-card h3 {
            font-family: 'Metrim', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        .btn-ver-coleccion {
            align-self: flex-start; /* Botón alineado con el texto */
            padding: 10px 25px;
            border: 1px solid #000;
            color: #000;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-ver-coleccion:hover {
            background: #000;
            color: #fff;
        }

        /* Footer */
        .footer { background: #ffffff; padding: 60px 20px; text-align: center; border-top: 1px solid #eeeeee; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer-links a { font-size: 11px; color: #000; text-decoration: none; text-transform: uppercase; }

        @media (max-width: 768px) { .grid-bloque { grid-template-columns: 1fr; } }

        .no-transition {
            transition: none !important;
        }
    </style>

</head>
